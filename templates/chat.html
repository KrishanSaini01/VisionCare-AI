{% extends "base.html" %}

{% block title %}
AI Medical Chat
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>

                🤖 VisionCare AI Assistant

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <textarea
                    class="form-control mb-3"
                    rows="4"
                    name="question"
                    placeholder="Ask a medical question..."
                    required></textarea>

                <button
                    class="btn btn-success">

                    Ask AI

                </button>

            </form>

            {% if answer %}

            <hr>

            <h4>

                AI Response

            </h4>

            <div class="alert alert-info">

                {{ answer }}

            </div>

            {% endif %}

        </div>

    </div>

</div>

{% endblock %}
