{% extends "base.html" %}

{% block title %}
Contact
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="text-primary">

            Contact Us

        </h1>

        <p class="lead text-muted">

            We'd love to hear from you.

        </p>

    </div>

    <div class="row">

        <!-- Contact Form -->

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label>Name</label>

                            <input
                                type="text"
                                class="form-control"
                                name="name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Subject</label>

                            <input
                                type="text"
                                class="form-control"
                                name="subject"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Message</label>

                            <textarea
                                class="form-control"
                                rows="6"
                                name="message"
                                required></textarea>

                        </div>

                        <button class="btn btn-primary">

                            <i class="bi bi-send-fill"></i>

                            Send Message

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Contact Info -->

        <div class="col-lg-5">

            <div class="card shadow h-100">

                <div class="card-body">

                    <h3>
                        
                        Contact Information

                    </h3>

                    <hr>

                    <p>

                        <i class="bi bi-envelope-fill text-primary"></i>

                        support@visioncareai.com

                    </p>

                    <p>

                        <i class="bi bi-telephone-fill text-success"></i>

                        +91 92164 80150

                    </p>

                    <p>

                        <i class="bi bi-geo-alt-fill text-danger"></i>

                        Jaipur, Rajasthan, India

                    </p>

                    <hr>

                    <h4>

                        Follow Us

                    </h4>

                    <a href="#" class="btn btn-dark me-2">

                        <i class="bi bi-github"></i>

                    </a>

                    <a href="#" class="btn btn-primary me-2">

                        <i class="bi bi-linkedin"></i>

                    </a>

                    <a href="#" class="btn btn-danger">

                        <i class="bi bi-google"></i>

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
