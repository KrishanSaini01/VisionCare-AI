{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <div class="text-center">

                    <i class="bi bi-heart-pulse-fill text-primary register-icon"></i>

                    <h2 class="mt-3">

                        Create Account

                    </h2>

                    <p class="text-muted">

                        Join VisionCare AI

                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Enter your name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Create password"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Confirm Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="confirm_password"
                            placeholder="Confirm password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        <i class="bi bi-person-plus-fill"></i>

                        Register

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="{{ url_for('auth.login') }}">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
