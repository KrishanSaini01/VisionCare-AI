{% extends "base.html" %}

{% block title %}Upload Image{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="text-center">

                        Upload Chest X-ray

                    </h3>

                </div>

                <div class="card-body">

                    <form
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        <div class="mb-3">

                            <label class="form-label">

                                Select Image

                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control"
                                accept=".jpg,.jpeg,.png"
                                required
                            >

                        </div>

                        <div class="text-center">

                            <button
                                type="submit"
                                class="btn btn-primary"
                            >

                                Predict Disease

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
